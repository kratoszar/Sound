name: soundwave
description: A modern music and video streaming app (TikTok + Spotify style) built with Flutter, Firebase, and Clean Architecture.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase core & services
  firebase_core: ^4.0.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.0.0

  # Auth & sign-in
  google_sign_in: ^6.2.1

  # State management
  provider: ^6.1.2

  # Media
  just_audio: ^0.9.39
  video_player: ^2.8.6

  # Picking files & images
  image_picker: ^1.1.1
  file_picker: ^8.0.0+1

  # UI utilities
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.8
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/audio/
    - assets/video/
